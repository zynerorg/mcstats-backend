[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
]

[licenses]
unused-allowed-license = "allow"
confidence-threshold = 0.8
allow = [
    "GPL-3.0",
    "GPL-3.0-or-later",
    "MIT",
    "Unicode-3.0",
    "MPL-2.0",
    "ISC",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "CC0-1.0",
]

