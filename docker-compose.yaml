services:
  syncer:
    build:
      context: .
      dockerfile: Dockerfile
    image: minecraft-stats:latest
    env_file:
      - .env
    volumes:
      - ./world:/app/world:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 3s
    command: ["/app/syncer"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: minecraft-stats:latest
    env_file:
      - .env
    volumes:
      - ./world:/app/world:ro
    ports:
      - "2456:2456"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 3s
    command: ["/app/api"]

  db:
    image: postgres:18
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: